[build]
  command = "npm run build:web"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,OAUTH_REDIRECT_URL"
  SECRETS_SCAN_OMIT_PATHS = "dist/runtime-config.js,public/runtime-config.js,READ_ME_FIRST.txt"

[[redirects]]
  from = "/api/vision-analysis"
  to = "/.netlify/functions/vision-analysis"
  status = 200

[[redirects]]
  from = "/api/tactical-coach"
  to = "/.netlify/functions/tactical-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
